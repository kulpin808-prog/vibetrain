<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f2f3f5">
    <title>Kools — админка клуба</title>
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="adm-body-root">
    <a class="adm-skip" href="#adm-main">К основному содержимому</a>
    <div class="adm-app" data-app>
        <aside class="adm-sidebar" aria-label="Разделы админки">
            <div class="adm-sidebar__brand">
                <span class="adm-logo" aria-hidden="true"></span>
                <div class="adm-sidebar__brand-text">
                    <span class="adm-sidebar__product">Kools</span>
                    <span class="adm-sidebar__tenant" data-tenant-name>FitPrime Арбат</span>
                </div>
            </div>

            <nav class="adm-nav" data-nav>
                <div class="adm-nav__group">
                    <span class="adm-nav__label">Обзор</span>
                    <a class="adm-nav__link is-active" href="#/dashboard" data-route="dashboard">
                        <span class="adm-nav__icon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M4 19V5"/><path d="M4 9h4v10H4zM10 3h4v16h-4zM16 13h4v6h-4z"/></svg></span>
                        Дашборд
                    </a>
                </div>
                <div class="adm-nav__group">
                    <span class="adm-nav__label">Клиенты</span>
                    <a class="adm-nav__link" href="#/clients" data-route="clients">
                        <span class="adm-nav__icon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
                        Участники
                    </a>
                    <a class="adm-nav__link" href="#/subscriptions" data-route="subscriptions">
                        <span class="adm-nav__icon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>
                        Подписки AI
                    </a>
                </div>
                <div class="adm-nav__group">
                    <span class="adm-nav__label">Клуб</span>
                    <a class="adm-nav__link" href="#/settings" data-route="settings">
                        <span class="adm-nav__icon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></span>
                        Настройки
                    </a>
                </div>
            </nav>

            <div class="adm-sidebar__footer">
                <button type="button" class="adm-user-chip" data-admin-profile>
                    <span class="adm-avatar">МК</span>
                    <span class="adm-user-chip__meta">
                        <span class="adm-user-chip__name">Мария К.</span>
                        <span class="adm-user-chip__role">Администратор</span>
                    </span>
                </button>
            </div>
        </aside>

        <div class="adm-workspace">
            <header class="adm-topbar">
                <div class="adm-topbar__left">
                    <h1 class="adm-page-title" data-page-title>Дашборд</h1>
                    <p class="adm-page-desc" data-page-desc>Сводка по взаимодействиям с AI-тренером</p>
                </div>
                <div class="adm-topbar__right">
                    <div class="adm-search" role="search">
                        <label class="visually-hidden" for="adm-global-search">Поиск по участникам</label>
                        <span class="adm-search__icon" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></span>
                        <input id="adm-global-search" class="adm-search__input" type="search" placeholder="Поиск по имени или Telegram…" autocomplete="off" data-global-search>
                    </div>
                    <button type="button" class="adm-btn adm-btn--primary" data-action-invite>
                        Пригласить участника
                    </button>
                </div>
            </header>

            <div class="adm-frame">
                <main class="adm-main" id="adm-main" tabindex="-1"></main>
                <aside class="adm-drawer" id="adm-drawer" aria-hidden="true" data-drawer>
                    <div class="adm-drawer__header">
                        <button type="button" class="adm-icon-btn adm-drawer__close" data-drawer-close aria-label="Закрыть панель">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <div class="adm-drawer__body" data-drawer-body></div>
                </aside>
            </div>
        </div>
    </div>

    <div class="adm-toast-region" aria-live="polite" data-toast-region></div>
    <script src="/admin/admin.js" type="module"></script>
</body>
</html>
