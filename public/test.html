<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Web App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🧪 Тест Web App</h1>
            <p>Тестирование отправки данных</p>
        </header>

        <form class="workout-form" id="testForm">
            <div class="form-section">
                <h2>Тестовая форма</h2>

                <div class="input-group">
                    <label for="testMessage">Тестовое сообщение:</label>
                    <input type="text" id="testMessage" name="message" value="Тест: похудеть, новичок, гантели" required>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="submit-btn" id="testSubmitBtn">
                    📤 Отправить тестовые данные
                </button>
            </div>
        </form>

        <div id="logContainer" style="margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 12px;">
            <h3>📋 Лог действий:</h3>
            <div id="log" style="font-family: monospace; font-size: 12px; white-space: pre-wrap;"></div>
        </div>
    </div>

    <script>
        const logElement = document.getElementById('log');
        const testForm = document.getElementById('testForm');
        const submitBtn = document.getElementById('testSubmitBtn');

        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logElement.textContent += `[${timestamp}] ${message}\n`;
            console.log(message);
        }

        // Проверяем наличие Telegram Web App
        window.addEventListener('load', () => {
            if (window.Telegram && window.Telegram.WebApp) {
                log('✅ Telegram Web App API доступен');
            } else {
                log('⚠️ Telegram Web App API не доступен (тестирование в браузере)');
            }
        });

        // Обработчик формы
        testForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const formData = new FormData(event.target);
            const message = formData.get('message');

            log(`📝 Собираем данные: "${message}"`);

            const dataToSend = JSON.stringify({
                type: 'workout_request',
                data: message
            });

            log(`📤 Данные для отправки: ${dataToSend}`);

            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправка...';

            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    log('🚀 Отправляем через Telegram Web App API');
                    window.Telegram.WebApp.sendData(dataToSend);
                    log('✅ Данные отправлены боту');

                    // Закрываем через 2 секунды
                    setTimeout(() => {
                        log('🔒 Закрываем Web App');
                        window.Telegram.WebApp.close();
                    }, 2000);
                } else {
                    log('💻 Режим браузера - отправляем на тестовый API');
                    const response = await fetch('/api/test', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: dataToSend
                    });

                    const result = await response.json();
                    log(`📡 Ответ сервера: ${JSON.stringify(result)}`);
                }
            } catch (error) {
                log(`❌ Ошибка: ${error.message}`);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '📤 Отправить тестовые данные';
            }
        });

        log('🎯 Тестовая страница загружена');
    </script>
</body>
</html>
